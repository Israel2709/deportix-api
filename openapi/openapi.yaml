components:
  parameters:
    page:
      name: page
      in: query
      description: 1-based page number.
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    pageSize:
      name: pageSize
      in: query
      description: Items per page.
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    season:
      name: season
      in: query
      description: Season year (e.g. `2026`).
      required: false
      schema:
        type: integer
        example: 2026
    from:
      name: from
      in: query
      description: Inclusive lower bound for match date (YYYY-MM-DD or ISO-8601, UTC).
      required: false
      schema:
        type: string
        format: date
    to:
      name: to
      in: query
      description: Inclusive upper bound for match date (YYYY-MM-DD or ISO-8601, UTC).
      required: false
      schema:
        type: string
        format: date
    date:
      name: date
      in: query
      description: Exact match date (YYYY-MM-DD, UTC). Mutually exclusive with `from`/`to`.
      required: false
      schema:
        type: string
        format: date
    status:
      name: status
      in: query
      description: Filter by raw match status code (e.g. `NS`, `FT`, `1H`).
      required: false
      schema:
        type: string
    teamId:
      name: teamId
      in: query
      description: Filter matches involving this team id.
      required: false
      schema:
        type: string
    leagueId:
      name: leagueId
      in: path
      required: true
      description: League id (or external provider id).
      schema:
        type: string
    teamIdPath:
      name: teamId
      in: path
      required: true
      description: Team id (or external provider id).
      schema:
        type: string
    matchIdPath:
      name: matchId
      in: path
      required: true
      description: Match id (or external provider id).
      schema:
        type: string
  responses:
    InvalidQueryParameter:
      description: One or more query parameters are invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: INVALID_QUERY_PARAMETER
