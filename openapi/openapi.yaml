openapi: 3.1.0
info:
  title: Deportix API
  description: |
    **Deportix API** is a public sports-data API powered by Cloud Firestore.

    It exposes three complementary surfaces:

    **Deportix API** (`/v1/*`) — versioned REST with `{ data, meta }` envelope. Used by the
    Deportix portal and internal tooling. Supports match management (POST / PATCH / DELETE).

    **BFF — API-Sports soccer** (`/countries`, `/leagues`, `/fixtures`, …) — read-only
    endpoints that mirror API-Sports Football v3 paths and response shape
    (`{ response, results, errors }`). Intended for the Flutter soccer app.

    **BFF American Football** (`/american-football/*`) — American Football BFF with the **full**
    envelope (`get`, `parameters`, `errors`, `results`, `paging`, `response`). Supports GET and
    CRUD (POST / PATCH / DELETE) for manual data loading from the Deportix portal.
    **Canonical IDs:** server-generated UUIDs (Firestore document ids) are returned in `response[]`.
    POST bodies must **not** include resource ids; reference existing entities by UUID in nested
    `league.id`, `team.id`, etc. Legacy api-sports numeric ids are accepted only as a read lookup
    fallback on PATCH/DELETE query params until old data is gone.

    ## MVP notes & limitations
    - **Mostly read-only.** All list/get endpoints use `GET`. Match management is available via
      `POST /v1/leagues/{leagueId}/matches` (create — defaults to current season, or target any
      season via `?season=` / body `seasonId`),
      `PATCH /v1/leagues/{leagueId}/matches/{matchId}` (partial update) and
      `DELETE /v1/leagues/{leagueId}/matches/{matchId}` (permanent removal). Authentication
      and rate limiting are not enforced yet; access is restricted operationally to authorized
      platform users.
    - **Partial coverage is expected.** The platform is fed manually. Some resources may be
      empty or incomplete. Use `GET /v1/data-status` to discover exactly what is available.
    - **American football coverage is partial and evolving** as data is loaded; some sub-resources may
      return empty collections or be unavailable.
    - **Liga MX — Apertura 2026** starts in July 2026; depending on load progress, matches
      and standings may not yet exist even when teams do.
    - **CORS is open** (`Access-Control-Allow-Origin: *`) on read endpoints. CORS is not a
      security mechanism for a public API; it only governs browser reads.
    - **Dates** are ISO-8601 and interpreted in **UTC**.

    ## Identifiers
    Path identifiers (`leagueId`, `teamId`) are the resource's stable id as returned by the
    API. The external provider id is also accepted as a fallback lookup.
  version: 1.0.0
  contact:
    name: Deportix API
  license:
    name: Proprietary
servers:
  - url: /
    description: Same-origin (relative) — works in every environment
  - url: https://deportix-api.vercel.app
    description: Production (placeholder — replace with the real deployment URL)
tags:
  - name: Meta
    description: Service metadata and data coverage
  - name: Catalog
    description: Sports and leagues catalog
  - name: Leagues
    description: League resources and their sub-resources
  - name: Teams
    description: Team resources
  - name: BFF
    description: |
      API-Sports compatible layer for soccer (Flutter). Returns `{ response, results, errors }`.
      League/team/fixture ids in query params use provider `externalId` values (e.g. `262` for Liga MX).
  - name: BFF American Football
    description: |
      API-Sports American Football v1 compatibility under `/american-football/*`. Returns the full api-sports
      envelope (`get`, `parameters`, `errors`, `results`, `paging`, `response`). Supports CRUD
      for portal data loading.
paths:
  /v1/health:
    get:
      tags: [Meta]
      summary: Health check
      description: Liveness probe. Reports API version and whether the data source is configured. Does not query Firestore.
      operationId: getHealth
      responses:
        '200':
          description: Service is up.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResource'
              example:
                data:
                  status: ok
                  apiVersion: v1
                  dataSourceConfigured: true
                  storageConfigured: true
                  timestamp: '2026-06-23T00:00:00.000Z'
                meta:
                  apiVersion: v1
                  updatedAt: '2026-06-23T00:00:00.000Z'
  /v1/uploads:
    post:
      tags: [Meta]
      summary: Upload image to Firebase Storage
      description: |
        Accepts `multipart/form-data` with an image file. Returns a public Firebase Storage URL
        for league/team logos and country flags (used by the Deportix portal).
      operationId: uploadImage
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: PNG, JPEG, WebP, or SVG (max 5 MB).
                purpose:
                  type: string
                  enum: [logo, alt_logo, flag, league_logo, team_logo, asset]
                  default: asset
                entityId:
                  type: string
                  description: Optional id used in the storage path (league id, team id, etc.).
      responses:
        '201':
          description: Image uploaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResource'
              example:
                data:
                  url: https://firebasestorage.googleapis.com/v0/b/deportix.appspot.com/o/uploads%2Fleague_logo%2F1%2F1730000000000-abc.png?alt=media
                meta:
                  apiVersion: v1
                  updatedAt: '2026-06-23T00:00:00.000Z'
        '400':
          $ref: '#/components/responses/InvalidRequestBody'
        '503':
          $ref: '#/components/responses/DataSourceNotConfigured'
  /v1/data-status:
    get:
      tags: [Meta]
      summary: Data coverage status
      description: |
        Per-league coverage derived from real document counts in Firestore. Key endpoint of
        the MVP: lets consumers discover what data exists before building UI around it.
      operationId: getDataStatus
      responses:
        '200':
          description: Coverage summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataStatusResource'
              example:
                data:
                  leagues:
                    - id: 8f1c...e2
                      externalId: '262'
                      name: Liga MX
                      sport: soccer
                      availableSeasons: [2026]
                      coverage: { teams: true, matches: true, standings: false, statistics: false }
                      updatedAt: '2026-06-23T00:00:00.000Z'
                    - id: a91d...77
                      externalId: '1'
                      name: NFL
                      sport: american-football
                      availableSeasons: []
                      coverage: { teams: true, matches: false, standings: false, statistics: false }
                      updatedAt: '2026-06-23T00:00:00.000Z'
                  sports:
                    - id: cdce9b99
                      slug: soccer
                      name: Soccer
                      leagueCount: 1230
                      coverage: { teams: true, matches: true, standings: true, statistics: false }
                    - id: 9590fe3b
                      slug: american-football
                      name: American Football
                      leagueCount: 0
                      coverage: { teams: false, matches: false, standings: false, statistics: false }
                meta:
                  apiVersion: v1
                  updatedAt: '2026-06-23T00:00:00.000Z'
        '503':
          $ref: '#/components/responses/DataSourceNotConfigured'
  /v1/sports:
    get:
      tags: [Catalog]
      summary: List sports
      operationId: listSports
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: A page of sports.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SportCollection'
        '503':
          $ref: '#/components/responses/DataSourceNotConfigured'
  /v1/countries:
    get:
      tags: [Catalog]
      summary: List countries (global catalog)
      description: |
        Shared country catalog for all sports. Backed by the Firestore `countries` collection.
        Same data as BFF `/countries` and `/american-football/countries`.
      operationId: listCatalogCountries
      parameters:
        - $ref: '#/components/parameters/page'
        - name: pageSize
          in: query
          schema: { type: integer, default: 250, maximum: 500 }
        - name: name
          in: query
          schema: { type: string }
        - name: code
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Paginated country catalog.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountryCollection'
        '503':
          $ref: '#/components/responses/DataSourceNotConfigured'
    post:
      tags: [Catalog]
      summary: Create country
      operationId: createCatalogCountry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogCountry'
      responses:
        '201':
          description: Country created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountryResource'
        '400':
          $ref: '#/components/responses/InvalidRequestBody'
    patch:
      tags: [Catalog]
      summary: Update country
      operationId: updateCatalogCountry
      parameters:
        - name: name
          in: query
          schema: { type: string }
        - name: code
          in: query
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogCountry'
      responses:
        '200':
          description: Country updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountryResource'
        '404':
          $ref: '#/components/responses/ResourceNotFound'
    delete:
      tags: [Catalog]
      summary: Delete country
      operationId: deleteCatalogCountry
      parameters:
        - name: name
          in: query
          schema: { type: string }
        - name: code
          in: query
          schema: { type: string }
      responses:
        '204':
          description: Country deleted.
        '404':
          $ref: '#/components/responses/ResourceNotFound'
  /v1/league-types:
    get:
      tags: [Catalog]
      summary: List league types (global catalog)
      description: |
        Shared league type catalog for all sports. Backed by the Firestore `league_types` collection.
        Values match api-sports `league.type` (e.g. `league`, `cup`).
      operationId: listCatalogLeagueTypes
      parameters:
        - $ref: '#/components/parameters/page'
        - name: pageSize
          in: query
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        '200':
          description: Paginated league type catalog.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeagueTypeCollection'
        '503':
          $ref: '#/components/responses/DataSourceNotConfigured'
  /v1/game-stages:
    get:
      tags: [Catalog]
      summary: List game stages (American Football catalog)
      description: |
        Shared game stage catalog for American Football BFF. Backed by the Firestore `game_stages` collection.
        Values match api-sports American Football v1 `game.stage` (e.g. `Regular Season`, `Wild Card`).
      operationId: listCatalogGameStages
      parameters:
        - $ref: '#/components/parameters/page'
        - name: pageSize
          in: query
          schema: { type: integer, default: 50, maximum: 100 }
      responses:
        '200':
          description: Paginated game stage catalog.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameStageCollection'
        '503':
          $ref: '#/components/responses/DataSourceNotConfigured'
  /v1/leagues:
    get:
      tags: [Catalog, Leagues]
      summary: List leagues
      operationId: listLeagues
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - name: sport
          in: query
          description: Filter leagues by sport slug (e.g. `soccer`, `american-football`).
          required: false
          schema:
            type: string
        - name: sort
          in: query
          description: Sort by `name` (default) or `name`/`-name`.
          required: false
          schema:
            type: string
            enum: [name, -name]
      responses:
        '200':
          description: A page of leagues.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeagueCollection'
        '400':
          $ref: '#/components/responses/InvalidQueryParameter'
        '503':
          $ref: '#/components/responses/DataSourceNotConfigured'
  /v1/leagues/{leagueId}:
    get:
      tags: [Leagues]
      summary: Get a league
      operationId: getLeague
      parameters:
        - $ref: '#/components/parameters/leagueId'
      responses:
        '200':
          description: The league.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeagueResource'
        '404':
          $ref: '#/components/responses/ResourceNotFound'
        '503':
          $ref: '#/components/responses/DataSourceNotConfigured'
  /v1/leagues/{leagueId}/seasons:
    get:
      tags: [Leagues]
      summary: List a league's seasons
      operationId: listLeagueSeasons
      parameters:
        - $ref: '#/components/parameters/leagueId'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
      responses:
        '200':
          description: A page of seasons (may be empty).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeasonCollection'
        '404':
          $ref: '#/components/responses/ResourceNotFound'
        '503':
          $ref: '#/components/responses/DataSourceNotConfigured'
  /v1/leagues/{leagueId}/teams:
    get:
      tags: [Leagues, Teams]
      summary: List a league's teams
      operationId: listLeagueTeams
      parameters:
        - $ref: '#/components/parameters/leagueId'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - name: conference
          in: query
          description: NFL only — filter by conference (e.g. `AFC`, `NFC`).
          required: false
          schema:
            type: string
        - name: division
          in: query
          description: NFL only — filter by division.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: A page of teams (may be empty).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamCollection'
        '400':
          $ref: '#/components/responses/InvalidQueryParameter'
        '404':
          $ref: '#/components/responses/ResourceNotFound'
        '503':
          $ref: '#/components/responses/DataSourceNotConfigured'
  /v1/leagues/{leagueId}/standings:
    get:
      tags: [Leagues]
      summary: List a league's standings
      description: Standings for a season. Defaults to the league's current season when `season` is omitted.
      operationId: listLeagueStandings
      parameters:
        - $ref: '#/components/parameters/leagueId'
        - $ref: '#/components/parameters/season'
      responses:
        '200':
          description: Standings rows (may be empty when not yet loaded).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandingCollection'
        '400':
          $ref: '#/components/responses/InvalidQueryParameter'
        '404':
          $ref: '#/components/responses/ResourceNotFound'
        '503':
          $ref: '#/components/responses/DataSourceNotConfigured'
  /v1/leagues/{leagueId}/matches:
    get:
      tags: [Leagues]
      summary: List a league's matches
      operationId: listLeagueMatches
      parameters:
        - $ref: '#/components/parameters/leagueId'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/season'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/date'
        - $ref: '#/components/parameters/teamId'
        - $ref: '#/components/parameters/status'
        - name: sort
          in: query
          description: Sort by match date. `date` ascending or `-date` descending (default `-date`).
          required: false
          schema:
            type: string
            enum: [date, -date]
      responses:
        '200':
          description: A page of matches (may be empty).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchCollection'
        '400':
          $ref: '#/components/responses/InvalidQueryParameter'
        '404':
          $ref: '#/components/responses/ResourceNotFound'
        '503':
          $ref: '#/components/responses/DataSourceNotConfigured'
    post:
      tags: [Leagues]
      summary: Create a match
      description: |
        Creates a new match for the league. By default the match is assigned to the **current
        season** (marked `current`, or the most recent one as fallback). To target another
        season, pass `?season=` (year, e.g. `2025`) and/or body `seasonId` (document id or
        provider `externalId`). When both are sent they must refer to the same season.

        `home.teamId` and `away.teamId` must refer to teams belonging to the league (API id or
        provider `externalId`). Team names and logos are denormalized from the league roster when
        omitted in the body.

        Returns `201 Created` with the new match in the standard resource envelope.
      operationId: createLeagueMatch
      parameters:
        - $ref: '#/components/parameters/leagueId'
        - $ref: '#/components/parameters/season'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatchCreate'
            example:
              date: '2026-11-08T21:00:00.000Z'
              status: NS
              round: Clausura - 16
              venue: Estadio Monumental
              home: { teamId: tm_boca }
              away: { teamId: tm_river }
      responses:
        '201':
          description: The created match.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResource'
        '400':
          $ref: '#/components/responses/InvalidRequestBody'
        '404':
          $ref: '#/components/responses/ResourceNotFound'
        '503':
          $ref: '#/components/responses/DataSourceNotConfigured'
  /v1/leagues/{leagueId}/matches/{matchId}:
    patch:
      tags: [Leagues]
      summary: Update a league match
      description: |
        Partially updates a match belonging to the given league. Only the fields present in
        the request body are modified; omitted fields are left unchanged.

        Path identifiers accept the API `id` or the provider `externalId`. The match must
        belong to the league resolved from `{leagueId}`.

        **Soccer** denormalized fields (`fixture_date`, nested `goals`, `teams`, `league.round`,
        etc.) are kept in sync when you update the corresponding public fields (`date`, `home.score`,
        `round`, …). **NFL** uses flat fields such as `game_date`, `home_score` and `away_score`.
      operationId: updateLeagueMatch
      parameters:
        - $ref: '#/components/parameters/leagueId'
        - $ref: '#/components/parameters/matchIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatchUpdate'
            examples:
              updateScore:
                summary: Set final score (soccer)
                value:
                  status: FT
                  home: { score: 2 }
                  away: { score: 1 }
              reschedule:
                summary: Change kick-off time
                value:
                  date: '2026-11-08T22:00:00.000Z'
      responses:
        '200':
          description: The updated match.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResource'
        '400':
          $ref: '#/components/responses/InvalidRequestBody'
        '404':
          $ref: '#/components/responses/ResourceNotFound'
        '503':
          $ref: '#/components/responses/DataSourceNotConfigured'
    delete:
      tags: [Leagues]
      summary: Delete a league match
      description: |
        Permanently removes a match from Firestore. The match must belong to the league
        resolved from `{leagueId}`. Path identifiers accept the API `id` or the provider
        `externalId`.

        Returns `204 No Content` on success (no response body).
      operationId: deleteLeagueMatch
      parameters:
        - $ref: '#/components/parameters/leagueId'
        - $ref: '#/components/parameters/matchIdPath'
      responses:
        '204':
          description: Match deleted successfully.
        '404':
          $ref: '#/components/responses/ResourceNotFound'
        '503':
          $ref: '#/components/responses/DataSourceNotConfigured'
  /v1/teams/{teamId}:
    get:
      tags: [Teams]
      summary: Get a team
      operationId: getTeam
      parameters:
        - $ref: '#/components/parameters/teamIdPath'
      responses:
        '200':
          description: The team.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResource'
        '404':
          $ref: '#/components/responses/ResourceNotFound'
        '503':
          $ref: '#/components/responses/DataSourceNotConfigured'
  /v1/teams/{teamId}/matches:
    get:
      tags: [Teams]
      summary: List a team's matches
      operationId: listTeamMatches
      parameters:
        - $ref: '#/components/parameters/teamIdPath'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/season'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/date'
        - $ref: '#/components/parameters/status'
        - name: sort
          in: query
          schema:
            type: string
            enum: [date, -date]
      responses:
        '200':
          description: A page of matches for the team (may be empty).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchCollection'
        '400':
          $ref: '#/components/responses/InvalidQueryParameter'
        '404':
          $ref: '#/components/responses/ResourceNotFound'
        '503':
          $ref: '#/components/responses/DataSourceNotConfigured'
  /countries:
    get:
      tags: [BFF]
      summary: List countries (API-Sports)
      description: Soccer reference data. Filter by `name` (substring) or `code` (ISO, exact).
      operationId: bffListCountries
      parameters:
        - name: name
          in: query
          schema: { type: string }
        - name: code
          in: query
          schema: { type: string, example: MX }
      responses:
        '200':
          description: API-Sports envelope with country objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSportsCountryList'
        '400':
          $ref: '#/components/responses/BffInvalidParameter'
        '503':
          $ref: '#/components/responses/DataSourceNotConfigured'
  /leagues:
    get:
      tags: [BFF]
      summary: List leagues (API-Sports)
      description: |
        Soccer leagues with nested `seasons[]`. Filter by `id` (provider league id), `country`
        (name substring), `season` (year — league must have that season), or `current=true`.
      operationId: bffListLeagues
      parameters:
        - name: id
          in: query
          description: Provider league id (e.g. `262`).
          schema: { type: string }
        - name: country
          in: query
          schema: { type: string }
        - name: season
          in: query
          schema: { type: integer, example: 2026 }
        - name: current
          in: query
          schema: { type: boolean }
      responses:
        '200':
          description: API-Sports envelope with league, country, and seasons entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSportsLeagueList'
        '400':
          $ref: '#/components/responses/BffInvalidParameter'
        '503':
          $ref: '#/components/responses/DataSourceNotConfigured'
  /leagues/seasons:
    get:
      tags: [BFF]
      summary: List global season years (API-Sports)
      description: Distinct season years across all leagues in the platform.
      operationId: bffListGlobalSeasons
      responses:
        '200':
          description: API-Sports envelope with an array of years (integers).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSportsIntegerList'
        '503':
          $ref: '#/components/responses/DataSourceNotConfigured'
  /fixtures:
    get:
      tags: [BFF]
      summary: List fixtures (API-Sports)
      description: |
        Soccer matches in API-Sports shape (`fixture`, `league`, `teams`, `goals`).
        Requires `league` and/or `team` (provider ids), or `id` / `ids` for direct lookup.
        Supports `season`, `date`, `from`/`to`, `round`, `status`, `last`, `next`, `live`.
      operationId: bffListFixtures
      parameters:
        - name: id
          in: query
          schema: { type: string }
        - name: ids
          in: query
          description: Hyphen-separated fixture ids (e.g. `1-2-3`).
          schema: { type: string }
        - name: live
          in: query
          schema: { type: boolean }
        - name: league
          in: query
          description: Provider league id (required unless `id`, `ids`, or `team` is set).
          schema: { type: string, example: '262' }
        - name: season
          in: query
          schema: { type: integer, example: 2026 }
        - name: team
          in: query
          description: Provider team id.
          schema: { type: string }
        - name: date
          in: query
          schema: { type: string, format: date }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
        - name: round
          in: query
          schema: { type: string }
