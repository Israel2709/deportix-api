            query parameter (year). When both are sent they must refer to the same season.
        date: { type: string, format: date-time, description: Kick-off / game date (UTC). }
        status: { type: [string, 'null'], example: NS }
        round: { type: [string, 'null'] }
        venue: { type: [string, 'null'] }
        home: { $ref: '#/components/schemas/MatchSideCreate' }
        away: { $ref: '#/components/schemas/MatchSideCreate' }
    MatchUpdate:
      type: object
      description: |
        Partial match update. All properties are optional, but at least one must be sent.
        Field names mirror the public `Match` resource (camelCase).
      minProperties: 1
      properties:
        externalId: { type: [string, 'null'] }
        seasonId: { type: [string, 'null'] }
        date: { type: [string, 'null'], format: date-time, description: Kick-off / game date (UTC). }
        status: { type: [string, 'null'], example: FT }
        round: { type: [string, 'null'] }
        venue: { type: [string, 'null'] }
        home: { $ref: '#/components/schemas/MatchSideUpdate' }
        away: { $ref: '#/components/schemas/MatchSideUpdate' }
    Match:
      type: object
      properties:
        id: { type: string }
        externalId: { type: [string, 'null'] }
        sport: { type: [string, 'null'] }
        leagueId: { type: [string, 'null'] }
        seasonId: { type: [string, 'null'] }
        date: { type: [string, 'null'], format: date-time }
        status: { type: [string, 'null'], example: NS }
        round: { type: [string, 'null'] }
        venue: { type: [string, 'null'] }
